# BidNow Client - Network configuration
# Tuần 11: tách config khỏi code, dễ thay đổi khi demo

# Server connection
server.host=localhost
server.port=7070

# Timeouts (ms)
connection.timeout=8000
read.timeout=15000

# Reconnect policy
reconnect.enabled=true
reconnect.max-attempts=3
reconnect.backoff-ms=1000

# Logging
log.network=true
log.messages=false
