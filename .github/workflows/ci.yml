name: Java CI with Maven

# Task 4.1: Tự động chạy khi push hoặc pull request vào các nhánh chính
on:
  push:
    branches: [ "main", "sunlight_dev" ]
  pull_request:
    branches: [ "main", "sunlight_dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kiểm tra mã nguồn từ repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Java JDK 17 (theo cấu hình pom.xml của bạn)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Bước 3: Biên dịch và chạy toàn bộ Unit Test (JUnit 5 đã cài ở Tuần 8)
      - name: Build and Test with Maven
        run: mvn -B clean package --file pom.xml

      # Bước 4: Lưu trữ file .jar sau khi build thành công để có thể tải về (Artifact)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: auction-system-jar
          path: target/*.jar